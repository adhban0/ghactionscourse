on:
  workflow_dispatch:
    inputs:
      environment:
        default: "staging"
        type: choice
        options:
          - staging
          - production
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: echo
        run: |
          echo "::add-mask::${{ inputs.environment }}"
          echo "Environment is ${{ inputs.environment }}!"
      - name: success
        run: echo "::warning::false negative"
        if: success()
